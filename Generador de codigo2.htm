<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL AI Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; }
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body class="p-4 font-sans">
    <div class="max-w-md mx-auto">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-teal-400">Asistente SQL JSON</h1>
            <p class="text-slate-500 text-xs uppercase tracking-widest">Versión Estable 4.0</p>
        </div>

        <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-xl">
            <label class="block text-xs font-bold text-slate-400 mb-2">DESCRIPCIÓN DE LA CONSULTA:</label>
            <textarea id="promptInput" 
                class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-sm text-white focus:border-teal-500 outline-none h-32"
                placeholder="Ej: Muestra el nombre de la tabla usuarios donde el campo json perfil tenga edad 25"></textarea>
            
            <button onclick="ejecutarIA()" id="mainBtn" 
                class="w-full mt-4 bg-teal-600 hover:bg-teal-500 text-white font-bold py-4 rounded-xl btn-active shadow-lg shadow-teal-900/20">
                GENERAR CÓDIGO ✨
            </button>
        </div>

        <!-- Estado de carga -->
        <div id="loading" class="hidden mt-6 text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-teal-500 border-t-transparent"></div>
            <p class="text-teal-500 text-sm mt-2 font-medium">Conectando con Gemini...</p>
        </div>

        <!-- Resultados -->
        <div id="resultContainer" class="hidden mt-6 animate-in fade-in">
            <div class="bg-black/50 p-5 rounded-2xl border border-teal-500/30">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[10px] font-bold text-teal-500 uppercase">Resultado SQL:</span>
                    <button onclick="copiarTexto()" class="text-[10px] text-slate-400 underline">Copiar</button>
                </div>
                <code id="sqlOutput" class="block text-teal-300 text-xs font-mono break-all bg-slate-900 p-3 rounded-lg mb-4"></code>
                <div class="border-t border-slate-800 pt-3">
                    <p id="descOutput" class="text-xs text-slate-400 italic"></p>
                </div>
            </div>
        </div>

        <!-- Error Log (Para saber qué falla) -->
        <div id="errorLog" class="hidden mt-4 p-3 bg-red-900/20 border border-red-500/50 rounded-lg text-[10px] text-red-400 font-mono"></div>
    </div>

    <script>
        const apiKey = ""; // El sistema inyecta la clave automáticamente

        async function ejecutarIA() {
            const input = document.getElementById('promptInput').value;
            if (!input.trim()) return;

            const btn = document.getElementById('mainBtn');
            const load = document.getElementById('loading');
            const res = document.getElementById('resultContainer');
            const errorDiv = document.getElementById('errorLog');
            
            // Reset de UI
            btn.disabled = true;
            btn.classList.add('opacity-50');
            load.classList.remove('hidden');
            res.classList.add('hidden');
            errorDiv.classList.add('hidden');

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ 
                            parts: [{ 
                                text: `Actúa como experto en MySQL. Genera SQL para trabajar con JSON: ${input}. Formato estricto: [SQL] tu_codigo [DESC] tu_explicacion` 
                            }] 
                        }]
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`HTTP ${response.status}: ${JSON.stringify(errorData)}`);
                }

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;

                // Procesar respuesta
                const sqlMatch = text.split('[SQL]')[1]?.split('[DESC]')[0] || text;
                const descMatch = text.split('[DESC]')[1] || "Código generado con éxito.";

                document.getElementById('sqlOutput').textContent = sqlMatch.trim();
                document.getElementById('descOutput').textContent = descMatch.trim();
                res.classList.remove('hidden');

            } catch (err) {
                errorDiv.textContent = "ERROR TÉCNICO: " + err.message;
                errorDiv.classList.remove('hidden');
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                load.classList.add('hidden');
            }
        }

        function copiarTexto() {
            const text = document.getElementById('sqlOutput').textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert("¡Código copiado!");
            });
        }
    </script>
</body>
</html>
