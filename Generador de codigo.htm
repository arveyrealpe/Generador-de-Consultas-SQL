<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MySQL JSON AI Assistant</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/4248/4248443.png">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(51, 65, 85, 0.5);
        }
        .loading-spinner {
            border: 3px solid rgba(20, 184, 166, 0.1);
            border-left-color: #14b8a6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="antialiased selection:bg-teal-500/30">

    <div class="max-w-md mx-auto min-h-screen flex flex-col p-4">
        
        <!-- Header -->
        <header class="flex items-center justify-between mb-8 pt-4">
            <div>
                <h1 class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-teal-400 to-blue-500">
                    SQL AI Generator
                </h1>
                <p class="text-slate-500 text-xs font-medium tracking-widest uppercase">MySQL + JSON Assistant</p>
            </div>
            <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-xl">🐬</div>
        </header>

        <!-- Input Area -->
        <div class="glass-card rounded-3xl p-6 shadow-2xl mb-6">
            <label class="block text-xs font-bold text-slate-400 uppercase mb-3 tracking-wider">Tu requerimiento:</label>
            <textarea id="aiInput" 
                placeholder="Ej: Crea una tabla para ventas con un campo JSON 'detalles' y selecciona el total donde el id sea 5..." 
                class="w-full bg-slate-900/50 border border-slate-700/50 rounded-2xl px-4 py-4 text-white text-sm focus:ring-2 focus:ring-teal-500 outline-none resize-none h-40 transition-all placeholder:text-slate-600"></textarea>
            
            <button onclick="generateSQL()" id="generateBtn"
                class="w-full mt-4 bg-gradient-to-r from-teal-600 to-blue-600 hover:from-teal-500 hover:to-blue-500 text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-lg flex items-center justify-center gap-3">
                <span>Generar Consulta</span>
                <span id="btnIcon">✨</span>
            </button>
        </div>

        <!-- Result Area -->
        <div id="aiLoading" class="hidden flex flex-col items-center justify-center py-10 space-y-4">
            <div class="loading-spinner"></div>
            <p class="text-teal-500 text-sm font-medium animate-pulse">Consultando a Gemini 2.5...</p>
        </div>

        <div id="aiResponseContainer" class="hidden space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="glass-card rounded-3xl p-6 border-teal-500/20">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-bold text-teal-500 uppercase tracking-widest">Resultado SQL</span>
                    <button onclick="copyCode()" class="text-[10px] bg-slate-800 px-3 py-1 rounded-full text-slate-300 hover:bg-slate-700 active:bg-teal-900 transition-colors">Copiar Código</button>
                </div>
                <pre id="aiCodeResponse" class="text-teal-300 font-mono text-xs whitespace-pre-wrap break-all bg-black/40 p-4 rounded-xl border border-slate-800/50 mb-4"></pre>
                <div id="aiTextResponse" class="text-xs text-slate-400 leading-relaxed italic border-t border-slate-800 pt-4"></div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-auto py-6 text-center">
            <p class="text-[10px] text-slate-600 font-medium">Powered by Google Gemini & Arvey Realpe © 2024</p>
        </footer>

    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-teal-500 text-slate-950 px-6 py-2 rounded-full text-xs font-bold shadow-2xl opacity-0 transition-all pointer-events-none">
        Copiado al portapapeles
    </div>

    <script>
        // API KEY MANAGEMENT
        const apiKey = ""; 

        async function fetchGemini(userPrompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const systemPrompt = "Eres un experto en MySQL 8.0+. Genera código SQL para manejar datos JSON. IMPORTANTE: Estructura tu respuesta así: Primero el código SQL dentro de bloques ```sql y luego una explicación muy breve de máximo 2 líneas.";
            
            const payload = {
                contents: [{ parts: [{ text: userPrompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (e) {
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
            throw new Error("No se pudo obtener respuesta tras varios intentos.");
        }

        async function generateSQL() {
            const input = document.getElementById('aiInput').value;
            if (!input.trim()) return;

            const btn = document.getElementById('generateBtn');
            const loading = document.getElementById('aiLoading');
            const container = document.getElementById('aiResponseContainer');
            const codeEl = document.getElementById('aiCodeResponse');
            const textEl = document.getElementById('aiTextResponse');

            btn.disabled = true;
            loading.classList.remove('hidden');
            container.classList.add('hidden');

            try {
                const response = await fetchGemini(input);
                
                // Extraer código de bloques markdown si existen
                const codeMatch = response.match(/```sql?([\s\S]*?)```/) || response.match(/```([\s\S]*?)```/);
                const cleanCode = codeMatch ? codeMatch[1].trim() : response.split('\n')[0];
                const cleanText = response.replace(/```[\s\S]*?```/g, '').trim();

                codeEl.textContent = cleanCode;
                textEl.textContent = cleanText || "Consulta generada basándose en tu solicitud.";

                container.classList.remove('hidden');
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
            }
        }

        function copyCode() {
            const text = document.getElementById('aiCodeResponse').textContent;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            
            const toast = document.getElementById('toast');
            toast.style.opacity = "1";
            setTimeout(() => toast.style.opacity = "0", 2000);
        }
    </script>
</body>
</html>
